defaults:
  - task: default_task_14
  - _self_

name: robot_${task.name}
_target_: diffusion_policy.workspace.robotworkspace_mn.RobotWorkspace

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "default"

task:
  # 主数据集：原始分辨率
  dataset:
    _target_: diffusion_policy.dataset.robot_image_dataset.RobotImageDataset
    # 原始分辨率数据
    zarr_path: data/${task.name}-demo_clean-50.zarr
    batch_size: ${dataloader.batch_size}
    horizon: ${horizon}
    pad_before: ${eval:'${n_obs_steps}-1'}
    pad_after: ${eval:'${n_action_steps}-1'}
    seed: 42
    val_ratio: 0.02
    max_train_episodes: null

  # 下采样数据集：2x 下采样版本
  dataset_downsample:
    _target_: diffusion_policy.dataset.robot_image_dataset.RobotImageDataset
    # 2x 下采样数据
    zarr_path: data/${task.name}-demo_clean-50_2x.zarr
    batch_size: ${dataloader.batch_size}
    horizon: ${horizon}
    pad_before: ${eval:'${n_obs_steps}-1'}
    pad_after: ${eval:'${n_action_steps}-1'}
    seed: 42
    val_ratio: 0.02
    max_train_episodes: null

horizon: 4

n_obs_steps: 3
n_action_steps: 6
n_latency_steps: 0

dataset_obs_steps: ${n_obs_steps}
past_action_visible: False
keypoint_visible_rate: 1.0
obs_as_global_cond: True

policy:
  _target_: diffusion_policy.policy.diffusion_unet_image_policy.DiffusionUnetImagePolicy

  shape_meta: ${shape_meta}

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    variance_type: fixed_small
    # Yilun's paper uses fixed_small_log instead, but easy to cause Nan
    clip_sample: True       # required when predict_epsilon=False
    prediction_type: epsilon  # or sample

  obs_encoder:
    _target_: diffusion_policy.model.vision.multi_image_obs_encoder.MultiImageObsEncoder
    shape_meta: ${shape_meta}
    rgb_model:
      _target_: diffusion_policy.model.vision.model_getter.get_resnet
      name: resnet18
      weights: null
    resize_shape: null
    crop_shape: null
    # constant center crop
    random_crop: True
    use_group_norm: True
    share_rgb_model: False
    imagenet_norm: True

  horizon: ${horizon}
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 100
  obs_as_global_cond: ${obs_as_global_cond}
  # crop_shape: null
  diffusion_step_embed_dim: 128
  # down_dims: [512, 1024, 2048]
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: True

  # scheduler.step params
  # predict_epsilon: True

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 32
  num_workers: 0
  shuffle: True
  pin_memory: True
  persistent_workers: False

val_dataloader:
  batch_size: 32
  num_workers: 0
  shuffle: False
  pin_memory: True
  persistent_workers: False

optimizer:
  _target_: torch.optim.AdamW
  lr: 5.0e-5
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: "cuda:0"

  # 这里打开你在 RobotWorkspace_mn 里实现的 Nash 双任务 loss
  use_nash: true        # 打开 Nash 权重平衡（你的 _nash_combine_two_losses 会生效）

  # 下面这几个目前在 workspace 里没用到，但保留也没问题
  nash_max_norm: 1.0
  nash_update_weights_every: 1
  nash_optim_niter: 20

  gradient_accumulate_every: 1
  seed: 42
  debug: False
  resume: True

  # optimization
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 600

  # EMA destroys performance when used with BatchNorm
  # replace BatchNorm with GroupNorm.
  use_ema: True
  freeze_encoder: False

  # training loop control
  # in epochs
  rollout_every: 50
  checkpoint_every: 100
  val_every: 1
  sample_every: 5

  # steps per epoch
  max_train_steps: null
  max_val_steps: null

  # misc
  tqdm_interval_sec: 1.0

logging:
  project: diffusion_policy_debug
  resume: True
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags: ["${name}", "${task_name}", "${exp_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: test_mean_score
    mode: max
    k: 5
    format_str: 'epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}

# 这三个是从 train.sh / 命令行里传进来的占位符
setting: null
expert_data_num: null
head_camera_type: null
